name: Release APK

# Triggered when pushing a version tag (v0.1.0, v0.2.0, ...)
# Builds a signed release APK + AAB and attaches them to the GitHub Release.
#
# Required GitHub repo secrets (Settings > Secrets and variables > Actions):
#   KEYSTORE_BASE64   - base64-encoded keystore/mamy-release.jks
#                       generate with: base64 -w 0 keystore/mamy-release.jks
#   KEYSTORE_PASSWORD - store password
#   KEY_ALIAS         - key alias (e.g. "mamy")
#   KEY_PASSWORD      - key password

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          # Strip whitespace/newlines that GitHub Actions secret UI can
          # introduce when the base64 is pasted with line wraps. Without
          # the tr step, the decoded .jks ends up truncated/corrupt and
          # keytool reports "Tag number over 30 is not supported".
          printf '%s' "$KEYSTORE_BASE64" | tr -d ' \t\n\r' | base64 --decode > keystore/mamy-release.jks
          if [ ! -s keystore/mamy-release.jks ]; then
            echo "::error::Keystore decode produced empty file"
            exit 1
          fi
          ls -la keystore/
          echo "Keystore SHA-256:"
          sha256sum keystore/mamy-release.jks

      - name: Create signing.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > signing.properties <<EOF
          storeFile=keystore/mamy-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build signed release AAB
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -not -name "*-unsigned*" | head -1)
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "apk=$APK_PATH" >> $GITHUB_OUTPUT
          echo "aab=$AAB_PATH" >> $GITHUB_OUTPUT
          ls -la "$APK_PATH" "$AAB_PATH"

      - name: Verify signing
        run: |
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner
          $APKSIGNER verify --verbose "${{ steps.artifacts.outputs.apk }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mamy-release-apk
          path: ${{ steps.artifacts.outputs.apk }}
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mamy-release-aab
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MamY ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          body: |
            # MamY ${{ github.ref_name }}

            **Alpha sideload distribution.** Download the APK below and follow
            the install steps in the README.

            ## Install

            1. On your Android device (API 28+ / Android 9+), enable "Install
               unknown apps" for your browser or file manager.
            2. Download `app-release.apk`.
            3. Tap to install.
            4. Run through the 7-step onboarding (mic + notif perms, voice keyword,
               Picovoice key, Claude API key).

            ## Required setup files

            - Picovoice AccessKey (free at console.picovoice.ai)
            - Trained `.ppn` files: `mamy_en.ppn` + `mamy_fr.ppn`
            - Anthropic Claude API key

            See `docs/SMOKE_CHECKLIST.md` for the V1 smoke scenarios.
          files: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.aab }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f signing.properties
          rm -f keystore/mamy-release.jks
